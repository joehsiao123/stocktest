name: Futures Jump Monitor

on:
  schedule:
    - cron: '* * * * *' # 每分鐘跑一次
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore last price cache
        uses: actions/cache/restore@v4
        with:
          path: last_f_price.txt
          key: fut-price-${{ github.run_id }}
          restore-keys: |
            fut-price-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python monitor.py

      - name: Save last price cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_f_price.txt
          key: fut-price-${{ github.run_timestamp }}
