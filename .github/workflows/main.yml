name: Price Jump Monitor

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

# 給予 Actions 寫入 Repo 的權限 (才能存檔)
permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python monitor.py

      - name: Commit last price
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. 先抓取遠端最新變更
          git fetch origin main
          
          # 2. 如果檔案有變動，才進行後續動作
          git add last_price.txt
          
          # 3. 嘗試提交，如果沒有變動則跳過 (exit 0)
          git commit -m "Update last price [skip ci]" || exit 0
          
          # 4. 關鍵：使用 rebase 模式拉取遠端更新，避免衝突
          git pull --rebase origin main
          
          # 5. 推送回遠端
          git push origin main
